version: '3.8'

services:
  postgres:
    # Pinned to 18-alpine to match Railway prod (which is on PG 18). A v15
    # client can't dump from a v18 server, so the local image needs to match
    # for `pg_dump`/`pg_restore` to work against prod snapshots.
    image: postgres:18-alpine
    container_name: hiringflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hiringflow
    ports:
      - "5433:5432"
    volumes:
      # PG 18 changed the recommended mount point — /var/lib/postgresql now
      # holds a versioned subdirectory so pg_upgrade --link works across
      # version bumps without mount boundary issues.
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
